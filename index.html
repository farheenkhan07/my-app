<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Document</title>
</head>
<style>
    body {
        background-color: hsla(352, 100%, 3%, 0.095);
    }
    #container {
        font-size: 120px;
        font-weight: bold;
        color: rgb(201, 53, 53);
        text-align: center;
        margin-top: 40px;
    }
    button {
        display: block;
        margin: 20px auto;
        font-size: 48px;
        padding: 20px 60px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        touch-action: manipulation;
        background-color: white;
        color: #e33a4b;
        font-weight: bold;
    }
   
  
</style>
<body>

    <div id ="container"></div>
    <button onclick="increment()"> + </button>

</body>

<script>
  let count = 0;
  document.getElementById("container").innerHTML = count;
  function increment(){
    count++;
    document.getElementById("container").innerHTML = count;
    console.log("count", count);
  }


</script>
</html>
